asset_sets:
  vanilla:
    resourcepacks: []
    shaderpack: null

  vanilla_unbound:
    description: "Vanilla materials with Complementary Unbound 5.8 for the look-development reference."
    resourcepacks: []
    shaderpack: complementary-unbound

  faithful_high_no_shader:
    description: "Faithful 32x + Fresh Animations without shaders for a texture-only high-quality preview."
    resourcepacks:
      - faithful-32x
      - fresh-animations
    shaderpack: null

  faithful_bsl:
    description: "Faithful 32x plus BSL shader, intended as medium-quality water/shading pass."
    resourcepacks:
      - faithful-32x
    shaderpack: bsl-shaders

  complementary_high:
    description: "Faithful 32x + Fresh Animations plus Complementary Reimagined for high-quality water/reflection/emissive lighting tests."
    resourcepacks:
      - faithful-32x
      - fresh-animations
    shaderpack: complementary-reimagined

  complementary_emissive:
    description: "Complementary shader with Fresh Animations, Visual Enchantments, and emissive ores."
    resourcepacks:
      - fresh-animations
      - fresh-animations-extensions
      - visual-enchantments
      - vanilla-glowing-ores
    shaderpack: complementary-reimagined

  barebones_fast:
    resourcepacks:
      - bare-bones
    shaderpack: makeup-ultra-fast-shaders

  default_hd_bsl:
    description: "Default HD 64x plus BSL for sharper material and water comparison."
