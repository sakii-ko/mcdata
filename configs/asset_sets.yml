asset_sets:
  vanilla:
    resourcepacks: []
    shaderpack: null

  faithful_bsl:
    description: "Faithful 32x plus BSL shader, intended as medium-quality water/shading pass."
    resourcepacks:
      - faithful-32x
    shaderpack: bsl-shaders

  complementary_high:
    description: "Faithful 32x + Fresh Animations plus Complementary Reimagined for high-quality water/reflection/emissive lighting tests."
    resourcepacks:
      - faithful-32x
      - fresh-animations
    shaderpack: complementary-reimagined

  complementary_emissive:
    description: "Complementary shader with Fresh Animations, Visual Enchantments, and emissive ores."
    resourcepacks:
      - fresh-animations
      - fresh-animations-extensions
      - visual-enchantments
      - vanilla-glowing-ores
    shaderpack: complementary-reimagined

  barebones_fast:
    resourcepacks:
      - bare-bones
    shaderpack: makeup-ultra-fast-shaders

  default_hd_bsl:
    description: "Default HD 64x plus BSL for sharper material and water comparison."
    resourcepacks:
      - default-hd-64x
    shaderpack: bsl-shaders

  default_hd128_bliss:
    description: "Default HD 128x plus Bliss for higher-detail water and sky comparison."
    resourcepacks:
      - default-hd-128x
    shaderpack: bliss-shader

  dramatic_solas:
    description: "Dramatic Skys plus Solas for sky and atmospheric lighting variation."
    resourcepacks:
      - dramatic-skys
    shaderpack: solas-shader

  faithful_sildurs:
    description: "Faithful 32x plus Sildur's Vibrant Shaders."
    resourcepacks:
      - faithful-32x
    shaderpack: sildurs-vibrant-shaders

  emissive_makeup:
    description: "Emissive texture pack plus MakeUp Ultra Fast shader."
    resourcepacks:
      - emissive-txf
      - vanilla-glowing-ores
    shaderpack: makeup-ultra-fast-shaders

  patrix_unbound:
    description: "Patrix 32x plus Complementary Unbound for high-quality material and water tests."
    resourcepacks:
      - patrix-32x
    shaderpack: complementary-unbound

  better_leaves_solas:
    description: "Better Leaves plus Solas for foliage and atmosphere variation."
    resourcepacks:
      - better-leaves
    shaderpack: solas-shader

  default3d_miniature:
    description: "3D Default plus Miniature Shader for geometry-like item/block silhouette variation."
    resourcepacks:
      - 3d-default
    shaderpack: miniature-shader

  simplista_unbound:
    description: "Simplista LabPBR-style pack plus Complementary Unbound."
    resourcepacks:
      - simplista
    shaderpack: complementary-unbound

  stylista_bliss:
    description: "Stylista LabPBR-style pack plus Bliss shader."
    resourcepacks:
      - stylista
    shaderpack: bliss-shader

  realiscraft_bsl:
    description: "RealisCraft demo plus BSL for realistic material pass."
    resourcepacks:
      - realiscraft-demo
    shaderpack: bsl-shaders

  glowing_ores_unbound:
    description: "Glowing ores plus Complementary Unbound for emissive-light tests."
    resourcepacks:
      - new-glowing-ores
      - subtly-glowing-ores
      - fresh-animations-emissive
    shaderpack: complementary-unbound

  connected_glass_bsl:
    description: "Connected glass/default connected textures plus BSL."
    resourcepacks:
      - fusion-connected-glass
      - mt-ct-d
    shaderpack: bsl-shaders
