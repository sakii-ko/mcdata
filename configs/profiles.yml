defaults:
  main_dir: ".mcdata/launcher"
  work_dir: ".mcdata/instances"
  server_dir: ".mcdata/servers"
  output_dir: "runs"
  width: 854
  height: 480
  username: "mcdata_bot"
  jvm_args: "-Xms2G -Xmx6G -XX:+UseG1GC"
  server_memory: "2G"
  server_port: 25565
  world_seed: 1
  gamemode: "creative"
  capture_ready_delay_sec: 15
  capture_fps: 24
  options:
    gamma: "1.0"
    fov: "0.0"
    maxFps: "120"
    enableVsync: "false"
  world_profile: "base_scene"
  world_state:
    time: "noon"
    weather: "clear"
    weather_duration_sec: 999999
    clear_dropped_items: true
    clear_inventory: true
    pregrant_recipes: true
    player:
      x: 0
      y: 64
      z: -14
      yaw: 0
      pitch: 18
    gamerules:
      command_block_output: false
      keep_inventory: true
      random_tick_speed: 0
      send_command_feedback: false
      show_death_messages: false
    scene:
      enabled: true
      origin: [0, 64, 0]

profiles:
  vanilla_low:
    description: "Latest vanilla release, minimum visual settings, no shader."
    version_strategy: "latest_release"
    loader: "vanilla"
    quality: "low"
    asset_set: "vanilla"
    width: 854
    height: 480
    server_port: 25565

  fabric_low:
    description: "Fabric + Sodium/Iris-capable baseline with low visual settings."
    version_strategy: "latest_modded"
    loader: "fabric"
    quality: "low"
    mods:
      - fabric-api
      - sodium
      - iris
      - modmenu
      - advancementdisable
      - no-chat-reports
    asset_set: "vanilla"
    width: 854
    height: 480
    server_port: 25566
    world_profile: "render_matrix_base"

  fabric_faithful_bsl:
